name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - 'claude/**'
      - 'feature/**'
      - 'story/**'

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # full history so gitleaks detect scans all commits

      # Version pinned to the gitleaks chocolatey package. Update the version
      # string here when a new release is needed (bump + re-run CI to confirm).
      - name: Install gitleaks
        run: choco install gitleaks --version 8.21.2 --yes --no-progress

      - name: Detect secrets — Principle 1 enforcement (Story #28)
        shell: pwsh
        run: gitleaks detect --source . --redact --no-banner

      - name: Secret-scan self-test (Story #28 proofs a/b)
        shell: pwsh
        run: ./scripts/Test-SecretScan.ps1

      - name: Verify GitHub Actions are SHA-pinned (Story #26)
        shell: pwsh
        run: ./scripts/Check-ActionsPinned.ps1

      - name: Actions-pinned self-test (Story #26 proofs a-g)
        shell: pwsh
        run: ./scripts/Test-ActionsPinned.ps1

  build-test-coverage:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Assert test project does not reference the app project (Seam 2)
        shell: pwsh
        run: |
          $proj = Get-Content WeatherPoC.Tests/WeatherPoC.Tests.csproj -Raw
          if ($proj -match 'WeatherPoC[\\/]WeatherPoC\.csproj') {
            Write-Host "FAIL: test project references the app project (Seam 2 boundary violated)"
            exit 1
          }
          Write-Host "OK: test project does not reference the app project"

      - name: Install MAUI workload
        run: dotnet workload install maui

      # --locked-mode (Story #27) gates the dependency graph against the committed
      # lockfiles; -r win-x64 (Story #21) downloads the Windows runtime pack the MAUI
      # head needs to build (NETSDK1112). The lockfiles are RID-complete (regenerated
      # with -r win-x64) so locked-mode and the RID restore agree.
      - name: Restore (locked mode, win-x64 — Stories #27 + #21)
        run: dotnet restore WeatherPoC.slnx --locked-mode -r win-x64

      - name: Build (Release) — proves the app compiles (Goal 1, Seam 3)
        run: dotnet build WeatherPoC.slnx -c Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test WeatherPoC.slnx -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings coverage.runsettings
          --results-directory ${{ github.workspace }}/TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.4.4

      - name: Generate coverage report
        run: >
          reportgenerator
          -reports:"${{ github.workspace }}/TestResults/**/coverage.cobertura.xml"
          -targetdir:"${{ github.workspace }}/CoverageReport"
          -reporttypes:"Html;Cobertura"

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: ${{ github.workspace }}/CoverageReport

      - name: Coverage scope assertion (Seam 2)
        shell: pwsh
        run: ./scripts/Check-CoverageScope.ps1 -CoberturaPath ${{ github.workspace }}/CoverageReport/Cobertura.xml

      - name: Coverage threshold gate (Seam 1)
        shell: pwsh
        run: ./scripts/Check-Coverage.ps1 -CoberturaPath ${{ github.workspace }}/CoverageReport/Cobertura.xml

      - name: Coverage-gate self-test (Seam 1 proofs a/b/c)
        shell: pwsh
        run: ./scripts/Test-CoverageGate.ps1

      - name: Coverage-scope self-test (Seam 2 proofs a/b/c/d)
        shell: pwsh
        run: ./scripts/Test-CoverageScope.ps1

      - name: Locked-restore self-test (Story #27 proof — bumped dependency rejected)
        shell: pwsh
        run: ./scripts/Test-LockedRestore.ps1
