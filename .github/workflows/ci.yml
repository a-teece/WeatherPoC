name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - 'claude/**'
      - 'feature/**'
      - 'story/**'

permissions:
  contents: read

jobs:
  build-test-coverage:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Assert test project does not reference the app project (Seam 2)
        shell: pwsh
        run: |
          $proj = Get-Content WeatherPoC.Tests/WeatherPoC.Tests.csproj -Raw
          if ($proj -match 'WeatherPoC[\\/]WeatherPoC\.csproj') {
            Write-Host "FAIL: test project references the app project (Seam 2 boundary violated)"
            exit 1
          }
          Write-Host "OK: test project does not reference the app project"

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore WeatherPoC.slnx -r win-x64

      - name: Build (Release) — proves the app compiles (Goal 1, Seam 3)
        run: dotnet build WeatherPoC.slnx -c Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test WeatherPoC.slnx -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings coverage.runsettings
          --results-directory ${{ github.workspace }}/TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.4.4

      - name: Generate coverage report
        run: >
          reportgenerator
          -reports:"${{ github.workspace }}/TestResults/**/coverage.cobertura.xml"
          -targetdir:"${{ github.workspace }}/CoverageReport"
          -reporttypes:"Html;Cobertura"

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: ${{ github.workspace }}/CoverageReport

      - name: Coverage scope assertion (Seam 2)
        shell: pwsh
        run: ./scripts/Check-CoverageScope.ps1 -CoberturaPath ${{ github.workspace }}/CoverageReport/Cobertura.xml

      - name: Coverage threshold gate (Seam 1)
        shell: pwsh
        run: ./scripts/Check-Coverage.ps1 -CoberturaPath ${{ github.workspace }}/CoverageReport/Cobertura.xml

      - name: Coverage-gate self-test (Seam 1 proofs a/b/c)
        shell: pwsh
        run: ./scripts/Test-CoverageGate.ps1

      - name: Coverage-scope self-test (Seam 2 proofs a/b/c/d)
        shell: pwsh
        run: ./scripts/Test-CoverageScope.ps1
