# TEMPORARY one-shot bootstrap (Story #21 + #27 reconciliation).
# #27 committed RID-less lockfiles, but the MAUI Windows head needs a win-x64
# restore to build (NETSDK1112), and a win-x64 restore changes the lock graph —
# so --locked-mode -r win-x64 fails against the RID-less locks. This job runs on
# Windows (the only platform that can resolve the win-x64 runtime pack), restores
# WITH the RID to regenerate RID-complete lockfiles, and commits them back to the
# branch. Once the lockfiles land, this workflow is deleted; CI then restores with
# --locked-mode -r win-x64 against the now-matching locks.
#
# Triggers only when this file itself is pushed (paths filter), so it does not run
# on ordinary branch pushes.
name: Regenerate lockfiles (one-shot)

on:
  push:
    branches:
      - 'story/21-ci-pipeline-build-test-coverage-report-gate-scope-assertion'
    paths:
      - '.github/workflows/regen-lockfiles.yml'

permissions:
  contents: write

jobs:
  regen:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore with win-x64 to regenerate RID-complete lockfiles
        run: dotnet restore WeatherPoC.slnx -r win-x64 --force-evaluate

      - name: Commit regenerated lockfiles
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add **/packages.lock.json
          $staged = git diff --cached --name-only
          if (-not $staged) {
            Write-Host "No lockfile changes — locks were already RID-complete."
            exit 0
          }
          Write-Host "Regenerated lockfiles:`n$staged"
          git commit -m "chore: regenerate RID-complete (win-x64) lockfiles for locked-mode CI (Story #21)"
          git push origin "HEAD:${{ github.ref_name }}"
